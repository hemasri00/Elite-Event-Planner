<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Elite Event Planner</title>
    
    <!-- Stylesheets: Bootstrap 5, Icons, FontAwesome, AOS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Custom stylesheet -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-premium-dark">

    <!-- PAGE LOADER -->
    <div id="loader">
        <div class="d-flex flex-column align-items-center">
            <div class="spinner"></div>
            <h5 class="text-white mt-4 fw-light tracking-wide">Elite Event Planner</h5>
        </div>
    </div>

    <!-- NAVIGATION BAR -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom fixed-top">
        <div class="container">
            <a class="navbar-brand navbar-brand-custom" href="/">
                <i class="bi bi-gem"></i> Elite Event <span>Planner</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="/"><i class="bi bi-house"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="/about"><i class="bi bi-info-circle"></i> About Us</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="/services"><i class="bi bi-tools"></i> Services</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="/events"><i class="bi bi-calendar-event"></i> Events</a></li>
                    <li class="nav-item"><a class="nav-link nav-link-custom" href="/contact"><i class="bi bi-envelope"></i> Contact</a></li>
                </ul>
                <ul class="navbar-nav ms-lg-3 border-lg-start ps-lg-3 align-items-center" id="navbar-right-links">
                    <li class="nav-item"><span class="spinner-border spinner-border-sm text-light" role="status"></span></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- LOGIN MAIN SECTION -->
    <section class="section-padding d-flex align-items-center min-vh-100" style="padding-top: 130px !important;">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-7 col-lg-5 col-xl-4" data-aos="zoom-in">
                    
                    <div class="glass-panel-dark p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-shield-lock display-5 text-warning"></i>
                            <h3 class="fw-bold mt-2">Welcome Back</h3>
                            <p class="text-white-50 small">Log in securely to view bookings and manage your events.</p>
                        </div>
                        
                        <form id="loginForm" novalidate>
                            <div class="mb-3">
                                <label for="email" class="form-label fw-semibold small text-white-50">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white bg-opacity-10 border-0 text-white-50"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="email" class="form-control form-control-elite-dark border-0" placeholder="e.g. liam@gmail.com" required>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold small text-white-50">Secure Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-white bg-opacity-10 border-0 text-white-50"><i class="bi bi-lock-fill"></i></span>
                                    <input type="password" id="password" class="form-control form-control-elite-dark border-0" placeholder="••••••••" required>
                                </div>
                            </div>
                            
                            <button type="submit" class="btn btn-elite w-100 fs-5 py-2">Log In <i class="bi bi-box-arrow-in-right ms-2"></i></button>
                        </form>
                        
                        <div class="text-center mt-4 border-top border-secondary pt-3">
                            <span class="text-white-50 small">New to Elite Event?</span>
                            <a href="/register" class="text-primary small fw-semibold ms-2">Register Now <i class="bi bi-arrow-right"></i></a>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </section>

    <!-- JavaScripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });
    </script>
    <script src="/static/js/main.js"></script>
    <script src="/static/js/auth.js"></script>
</body>
</html>
